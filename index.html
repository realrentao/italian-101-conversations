<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>101 Conversations · 意大利语听力练习</title>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #25253e;
    --border: #2a2a4a;
    --text: #e8e8f0;
    --text2: #9898b8;
    --accent: #7c5bf0;
    --accent2: #a78bfa;
    --green: #34d399;
    --gold: #fbbf24;
    --red: #f87171;
    --radius: 12px;
    --radius-sm: 8px;
    --sidebar-w: 280px;
    --font: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    --font-ita: 'Georgia', 'Times New Roman', serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 18px; scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ===== Sidebar (same as before) ===== */
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    height: 100vh; position: sticky; top: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 10;
    transition: transform .3s ease;
    overscroll-behavior: contain;
  }
  .sidebar-header { padding: 18px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-header h1 { font-size: 1.05rem; font-weight: 700; color: var(--accent2); }
  .sidebar-header p { font-size: .75rem; color: var(--text2); margin-top: 2px; }
  .sidebar-search { padding: 10px 12px; flex-shrink: 0; }
  .sidebar-search input {
    width: 100%; padding: 8px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: .85rem; outline: none;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .conv-list { 
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 4px 8px 20px;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    max-height: calc(100vh - 140px);
  }
  .conv-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .2s, color .2s;
    color: var(--text2); font-size: .88rem; user-select: none;
  }
  .conv-item:hover { background: var(--surface2); color: var(--text); }
  .conv-item.active { background: var(--accent); color: #fff; }
  .conv-num {
    width: 28px; height: 28px; border-radius: 50%; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: .72rem; font-weight: 600; flex-shrink: 0; color: var(--text2);
  }
  .conv-item.active .conv-num { background: rgba(255,255,255,.2); color: #fff; }
  .conv-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv-check { font-size: .65rem; opacity: .5; }
  .progress-info {
    text-align: center; color: var(--text2); font-size: .78rem;
    padding: 16px; border-top: 1px solid var(--border); flex-shrink: 0;
  }

  /* ===== Main ===== */
  .main {
    flex: 1; height: 100vh; overflow-y: auto;
    padding: 24px 32px 40px; max-width: 860px; margin: 0 auto;
    overscroll-behavior: contain;
  }

  /* ===== Conv Header ===== */
  .conv-header { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .conv-header .num-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent); color: #fff; padding: 4px 14px;
    border-radius: 20px; font-size: .75rem; font-weight: 600; margin-bottom: 10px;
  }
  .conv-header h2 { font-size: 1.5rem; font-weight: 700; line-height: 1.3; }
  .conv-actions {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; align-items: center;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: var(--radius-sm); border: none;
    font-size: .82rem; font-weight: 500; cursor: pointer; transition: all .2s;
    background: var(--surface2); color: var(--text);
  }
  .btn:hover { filter: brightness(1.15); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-sm { padding: 5px 12px; font-size: .78rem; }
  .voice-select { padding: 4px 8px; font-size: .75rem; border-radius: var(--radius); background: var(--surface); color: var(--text); border: 1px solid var(--border); margin-left: 8px; }

  /* ===== Paragraph Card ===== */
  .paragraph {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
    transition: border-color .2s;
  }
  .paragraph:hover { border-color: var(--accent2); }
  .paragraph.playing { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }

  .para-controls {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .speaker-label {
    font-size: .72rem; font-weight: 600; color: var(--accent2);
    background: var(--surface2); padding: 2px 10px; border-radius: 4px;
  }
  .play-btn {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s; background: var(--accent); color: #fff;
    font-size: .8rem; flex-shrink: 0;
  }
  .play-btn:hover { background: var(--accent2); transform: scale(1.05); }
  .play-btn.speaking { background: var(--gold); animation: pulse 1s infinite; }
  .speaker-name { font-size: .7rem; font-weight: 600; color: var(--accent2); background: var(--surface2); padding: 2px 8px; border-radius: 4px; margin-left: 8px; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,.5); } 50% { box-shadow: 0 0 0 8px rgba(251,191,36,0); } }

  .speed-group { display: flex; gap: 3px; }
  .speed-btn {
    padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2);
    font-size: .7rem; font-weight: 500; cursor: pointer; transition: all .15s;
  }
  .speed-btn:hover { border-color: var(--accent); color: var(--text); }
  .speed-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .text-toggle {
    font-size: .72rem; color: var(--text2); cursor: pointer;
    padding: 2px 8px; border-radius: 4px; transition: background .2s;
    margin-left: auto; user-select: none;
  }
  .text-toggle:hover { background: var(--surface2); }

  .para-text {
    font-family: var(--font-ita); font-size: 1.02rem; line-height: 1.7;
    color: var(--text); padding: 6px 0 2px 0; transition: all .3s;
    clear: both;
  }
  .para-text.hidden { display: none; }

  .trans-text {
    margin-top: 8px; padding: 10px 14px; background: var(--surface2);
    border-radius: var(--radius-sm); font-size: .92rem; line-height: 1.7;
    color: var(--green); cursor: pointer; transition: all .3s;
    max-height: 0; overflow: hidden; opacity: 0; padding: 0 14px;
  }
  .trans-text.open { max-height: 500px; padding: 10px 14px; opacity: 1; }

  /* ===== Progress Bar ===== */
  .audio-progress {
    width: 60px; height: 4px; background: var(--surface2); border-radius: 2px;
    overflow: hidden; flex-shrink: 0;
  }
  .audio-progress-bar {
    height: 100%; background: var(--accent2); border-radius: 2px;
    width: 0%; transition: width .1s;
  }

  /* ===== Vocab ===== */
  .vocab-section {
    margin-top: 24px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }
  .vocab-header {
    padding: 12px 18px; background: var(--surface2); font-weight: 600; font-size: .88rem;
    color: var(--accent2); cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  }
  .vocab-header:hover { filter: brightness(1.08); }
  .vocab-body { padding: 0 18px; max-height: 0; overflow: hidden; transition: all .3s; }
  .vocab-body.open { max-height: 2000px; padding: 14px 18px; }
  .vocab-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid var(--border); font-size: .9rem;
  }
  .vocab-row:last-child { border: none; }
  .vocab-word { font-family: var(--font-ita); font-weight: 500; flex: 1; }
  .vocab-meaning { color: var(--text2); flex: 1; }
  .vocab-play { cursor: pointer; color: var(--accent2); font-size: .8rem; }

  /* ===== Loading ===== */
  .loading {
    display: flex; align-items: center; justify-content: center; height: 60vh;
    flex-direction: column; gap: 16px; color: var(--text2);
  }
  .loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Nav arrows ===== */
  .nav-arrows { display: flex; justify-content: space-between; margin-top: 20px; gap: 12px; }
  .nav-arrows .btn { flex: 1; justify-content: center; max-width: 200px; }

  /* ===== Mobile ===== */
  .sidebar-toggle {
    display: none; position: fixed; top: 12px; left: 12px; z-index: 20;
    width: 40px; height: 40px; border-radius: var(--radius-sm);
    background: transparent; border: none; color: var(--accent2);
    font-size: 1.4rem; cursor: pointer; align-items: center; justify-content: center;
    opacity: 1;
  }
  .sidebar-toggle.hide { display: none !important; }
  .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 9; }

  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); touch-action: pan-y; }
    .sidebar.open { transform: translateX(0); }
    body.sidebar-open { overflow: hidden; }
    .sidebar-toggle { display: flex; }
    .mobile-overlay.active { display: block; }
    html { font-size: 20px; }
    .main { padding: 20px 16px 100px; }
    .conv-header h2 { font-size: 1.35rem; }
  }
  @media (max-width: 480px) {
    html { font-size: 18px; }
    .paragraph { padding: 12px 14px; }
    .main { padding: 16px 12px 100px; }
  }
</style>
</head>
<body>
  <button class="sidebar-toggle" id="sidebarToggle">☰</button>
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>🎧 101 Conversations</h1>
      <p>意大利语听力 · 中意双语</p>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="搜索对话标题…" autocomplete="off">
    </div>
    <div class="conv-list" id="convList">
      <div style="padding:20px;text-align:center;color:var(--text2)">⏳ 加载中...</div>
</div>
    <div class="progress-info" id="progressInfo">已读 0 / 101</div>
  </aside>

  <main class="main" id="main">
    <div id="contentArea">
      <div style="text-align:center;padding:80px 20px;color:var(--text2)" id="startScreen">
        <h2 style="color:var(--text);margin-bottom:16px;font-size:1.5rem">🎧 101 Conversations</h2>
        <p style="font-size:1rem;line-height:1.8">意大利语中级听力练习<br><span style="color:var(--accent2)">中意双语 · edge-tts原声 · 三段语速</span></p>
        <p style="margin-top:12px;font-size:.78rem;color:var(--text2)" id="loadHint">⏳ 数据预加载中…</p>
        <div style="margin-top:32px;display:flex;flex-direction:column;gap:10px;max-width:300px;margin-left:auto;margin-right:auto">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:left;font-size:.85rem;color:var(--text2)">
            👈 点击左侧任一篇对话开始
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:left;font-size:.85rem;color:var(--text2)">
            🔊 点击 ▶ 播放意大利语原声<br><span style="font-size:.75rem;opacity:.6">0.6x / 1x / 1.4x 三档语速</span>
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:left;font-size:.85rem;color:var(--text2)">
            📘 点击「译文」查看中文翻译
          </div>
        </div>
      </div>
    </div>
  </main>

<script>
// ===== State =====
let conversations = [];
let currentIdx = -1;
let listenedSet = new Set();
let currentAudio = null;
let currentVoice = localStorage.getItem('italianVoice') || 'Isabella';
let dataPromise = null;  // Preload promise

const LS_KEY = 'italian101_listened3';
const LS_CURRENT = 'italian101_current3';
const CACHE_KEY = 'italian101_cache';
const CACHE_TS_KEY = 'italian101_cache_ts';
const CACHE_VER_KEY = 'italian101_cache_ver';
const CACHE_VERSION = 42; // bump when data changes to invalidate old caches
const CACHE_MAX_AGE = 3600000; // 1 hour

try { listenedSet = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]')); } catch(e) {}

// ===== 全局错误兜底：避免页面白屏/卡在"加载中"却无任何提示 =====
function showFatal(msg) {
  const hint = document.getElementById('loadHint');
  if (hint) hint.textContent = '⚠️ ' + msg;
  const area = document.getElementById('contentArea');
  if (area) area.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--red)"><h3>⚠️ 加载失败</h3><p>无法加载对话数据，请按 <b>Ctrl+F5</b>（或 Cmd+Shift+R）强制刷新页面。</p></div>';
}
window.addEventListener('error', (ev) => { showFatal('页面运行出错，请强制刷新'); });
window.addEventListener('unhandledrejection', () => { showFatal('数据加载失败，请强制刷新'); });

// ===== Preload data (sessionStorage cache to avoid refetch) =====
async function preloadData() {
  // Try sessionStorage cache first
  const cached = sessionStorage.getItem(CACHE_KEY);
  const cachedTs = parseInt(sessionStorage.getItem(CACHE_TS_KEY) || '0');
  const cachedVer = parseInt(sessionStorage.getItem(CACHE_VER_KEY) || '0');
  if (cached && cachedVer === CACHE_VERSION && Date.now() - cachedTs < CACHE_MAX_AGE) {
    try {
      conversations = JSON.parse(cached);
      renderSidebar();
      updateProgress();
      document.getElementById('loadHint').textContent = '✅';
      return;
    } catch(e) { /* cache stale, fall through to fetch */ }
  }
  try {
    let resp = await fetch('conversations.json' + '?_=' + Date.now());
    if (!resp.ok) throw new Error('加载失败');
    conversations = await resp.json();
    try { sessionStorage.setItem(CACHE_KEY, JSON.stringify(conversations)); sessionStorage.setItem(CACHE_TS_KEY, Date.now()); sessionStorage.setItem(CACHE_VER_KEY, CACHE_VERSION); } catch(e) {}
    try { listenedSet = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]')); } catch(e) {}
    renderSidebar();
    updateProgress();
    document.getElementById('loadHint').textContent = '✅';
  } catch(e) {
    console.log('Preload failed:', e.message);
    showFatal('数据加载失败，请强制刷新');
  }
}

function renderSidebar(filterText) {
  const list = document.getElementById('convList');
  if (!list || conversations.length === 0) return;
  const q = (filterText || '').toLowerCase().trim();
  const frag = document.createDocumentFragment();
  conversations.forEach((c, i) => {
    const titleMatch = c.title.toLowerCase().includes(q);
    const cnMatch = (c.title_cn || '').toLowerCase().includes(q);
    if (q && !titleMatch && !cnMatch) return;
    const div = document.createElement('div');
    div.className = 'conv-item';
    div.dataset.idx = i;
    const cn = c.title_cn || '';
    div.innerHTML = '<div class="conv-num">' + c.num + '</div><div class="conv-title">' + escHtml(c.title) + (cn ? ' <span style="color:#9898b8;font-size:.85em">' + escHtml(cn) + '</span>' : '') + '</div>';
    div.addEventListener('click', function() {
      const idx = parseInt(this.dataset.idx);
      if (isNaN(idx)) return;
      document.querySelectorAll('.conv-item').forEach(el => el.classList.toggle('active', el === this));
      if (conversations.length > 0) {
        showConversation(idx);
        refreshTranslations();
      } else {
        document.getElementById('contentArea').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text2)"><div style="font-size:2rem;margin-bottom:16px">⏳</div><p>正在加载对话数据…</p></div>';
        ensureData().then(ok => { if (ok) { showConversation(idx); } });
      }
      closeSidebar();
    });
    frag.appendChild(div);
  });
  list.innerHTML = '';
  list.appendChild(frag);
}

// Search with debounce
let searchDebounce;
try {
  const inp = document.getElementById('searchInput');
  if (inp) {
    inp.addEventListener('input', function() {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => renderSidebar(this.value), 150);
    });
  }
} catch(e) { /* search unavailable */ }

// ===== Boot =====
dataPromise = preloadData();

// ===== Get data (from preload or wait) =====
async function ensureData() {
  if (conversations.length > 0) return true;
  await dataPromise;
  return conversations.length > 0;
}

function showError(msg) {
  const area = document.getElementById('contentArea');
  area.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--red)"><h3>⚠️</h3><p>' + msg + '</p></div>';
}

// ===== Per-paragraph audio loading (独立base64 json) =====
let loadedParaAudio = {};  // cache: key="num-idx" → {b64, voice, speaker}

async function loadParaAudio(num, pIdx) {
  const key = `${num}-${pIdx}`;
  if (loadedParaAudio[key]) return loadedParaAudio[key];
  try {
    const resp = await fetch(`audio_para/conv_${num}_${pIdx}.json?v=5`);
    if (resp.ok) {
      const data = await resp.json();
      loadedParaAudio[key] = data;
      return data;
    }
  } catch(e) { /* file not found */ }
  return null;
}

// ===== 译文加载（仍从 conversations.json） =====
function refreshTranslations() {
  const conv = conversations[currentIdx];
  if (!conv || !conv.translations) return;
  for (let pIdx = 0; pIdx < conv.paragraphs.length; pIdx++) {
    const transEl = document.getElementById(`trans-${currentIdx}-${pIdx}`);
    if (transEl && conv.translations[pIdx] && conv.translations[pIdx].length > 1) {
      if (!transEl.textContent || transEl.textContent.length < 5) {
        transEl.textContent = conv.translations[pIdx];
      }
    }
  }
}

function showConversation(idx) {
  if (idx < 0 || idx >= conversations.length) return;
  currentIdx = idx;
  localStorage.setItem(LS_CURRENT, idx);
  const conv = conversations[idx];
  const area = document.getElementById('contentArea');
  
  // Hide nav toggle when content is shown
  document.getElementById('sidebarToggle').classList.add('hide');
  
  // Update active state in sidebar
  document.querySelectorAll('.conv-item').forEach(item => {
    item.classList.toggle('active', parseInt(item.dataset.idx) === idx);
  });
  
  // Update checkmark
  if (listenedSet.has(conv.num)) {
    const item = document.querySelector(`.conv-item[data-idx="${idx}"] .conv-check`);
    if (!item) {
      const target = document.querySelector(`.conv-item[data-idx="${idx}"]`);
      if (target) {
        const check = document.createElement('div');
        check.className = 'conv-check';
        check.textContent = '✓';
        target.appendChild(check);
      }
    }
  }
  
  stopAll();
  
  let html = '';
  html += `
    <div class="conv-header">
      <div class="num-badge" onclick="showDirectory()" style="cursor:pointer">📖 对话 ${conv.num} / ${conversations.length}</div>
      <h2>${escHtml(conv.title)}</h2>
      ${conv.title_cn ? `<p style="font-size:.95rem;color:var(--text2);margin-top:2px">${escHtml(conv.title_cn)}</p>` : ''}
      <div class="conv-actions">
        <button class="btn btn-primary btn-sm" onclick="playAll(${idx})">▶ 播放全部</button>
        <button class="btn btn-sm" onclick="stopAll()">⏹ 停止</button>
      </div>
      <div id="transStatus" style="font-size:.78rem;color:var(--text2);margin-top:8px;display:${conv.translations ? 'none' : 'block'}">
        💡 点击「译文」按钮将自动加载中文翻译
      </div>
    </div>`;
  
  conv.paragraphs.forEach((para, pIdx) => {
    // Detect dialogue: a speaker label before the first colon.
    // Special case: walkie-talkie lines "Name [con il walkie-talkie]:text" have a long
    // speaker label that pushes the colon past the normal <25 char threshold, so the
    // speaker would otherwise be shown inline in the text. Extract it as a chip.
    const wkMarker = '[con il walkie-talkie]:';
    const wkPos = para.indexOf(wkMarker);
    let isDialogue = false, speaker = '', text = para;
    if (wkPos !== -1) {
      const colonPos = wkPos + wkMarker.length - 1; // position of the ':'
      isDialogue = true;
      speaker = para.slice(0, colonPos);
      text = para.slice(colonPos + 1).trim();
    } else {
      const colonIdx = para.indexOf(':');
      // colon within first 25 chars, char before colon is not a space
      // (narrative like "l'orologio: sono le 7" has colon mid-sentence)
      isDialogue = colonIdx > 0 && colonIdx < 25 && para[colonIdx - 1] !== ' ';
      speaker = isDialogue ? para.slice(0, colonIdx) : '';
      text = isDialogue ? para.slice(colonIdx + 1).trim() : para;
    }
    // Use base translations if available; if not yet loaded, show placeholder
    const trans = (conv.translations && conv.translations[pIdx] && conv.translations[pIdx].length > 1) ? conv.translations[pIdx] : '';
    const hasTrans = trans.length > 0;
    const audioId = `audio-${idx}-${pIdx}`;
    const textId = `text-${idx}-${pIdx}`;
    const transId = `trans-${idx}-${pIdx}`;
    const speedKey = `speed3-${idx}-${pIdx}`;
    const savedSpeed = parseFloat(localStorage.getItem(speedKey) || '1');
    
    html += `
    <div class="paragraph" id="para-${idx}-${pIdx}">
      <div class="para-controls">
        <button class="play-btn" id="play-${idx}-${pIdx}" onclick="togglePlay(${idx},${pIdx})" title="播放">▶</button>
        <div class="speed-group">
          ${[0.6, 1.0, 1.4].map(s =>
            `<button class="speed-btn${s === savedSpeed ? ' active' : ''}" onclick="setSpeed(${idx},${pIdx},${s})">${s}x</button>`
          ).join('')}
        </div>
        <div class="audio-progress" id="prog-${idx}-${pIdx}"><div class="audio-progress-bar" id="progbar-${idx}-${pIdx}"></div></div>
        ${speaker ? `<span class="speaker-name">${escHtml(speaker)}</span>` : ''}
        <span class="text-toggle" onclick="toggleTranslation(${idx},${pIdx})">📘 译文</span>
        <span class="text-toggle" onclick="toggleText(${idx},${pIdx})">👁 原文</span>
      </div>
      <div class="para-text" id="${textId}">${escHtml(text)}</div>
      <div class="trans-text" id="${transId}">${trans ? escHtml(trans) : ''}</div>
      <audio id="${audioId}" preload="none" src=""></audio>
    </div>`;
  });
  
  // Vocab
  if (conv.vocab && conv.vocab.length > 0) {
    html += `
    <div class="vocab-section">
      <div class="vocab-header" onclick="this.nextElementSibling.classList.toggle('open')">
        📚 词汇表 · Lessico <span>${conv.vocab.length} 词</span>
      </div>
      <div class="vocab-body">
        ${conv.vocab.map((v, vi) => `
          <div class="vocab-row">
            <span class="vocab-play" onclick="speakWord(${conv.num},${vi})">🔊</span>
            <span class="vocab-word">${escHtml(v.word)}</span>
            <span class="vocab-meaning">${escHtml(v.meaning)}</span>
          </div>
        `).join('')}
      </div>
    </div>`;
  }
  
  html += `
    <div class="nav-arrows">
      <button class="btn" onclick="goConv(${idx - 1})" ${idx === 0 ? 'disabled style="opacity:.4"' : ''}>← 上一篇</button>
      <button class="btn" onclick="goConv(${idx + 1})" ${idx === conversations.length - 1 ? 'disabled style="opacity:.4"' : ''}>下一篇 →</button>
    </div>`;
  
  area.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setVoiceUI(); // Sync voice select to saved preference
}

// ===== Audio =====
function getAudioEl(convIdx, paraIdx) {
  return document.getElementById(`audio-${convIdx}-${paraIdx}`);
}

// 加载并播放单个段落的音频（按需加载独立json）
async function loadAndPlay(convIdx, paraIdx) {
  const conv = conversations[convIdx];
  if (!conv) return;
  const audio = getAudioEl(convIdx, paraIdx);
  if (!audio) return;

  // 如果audio已有base64 src（暂停后恢复），直接播放
  if (audio.src && audio.src.includes('base64') && audio.src.length > 300) {
    startPlayback(audio, convIdx, paraIdx);
    return;
  }

  // 检查缓存
  const key = `${conv.num}-${paraIdx}`;
  const cached = loadedParaAudio[key];
  if (cached && cached.b64 && cached.b64.length > 200) {
    audio.src = 'data:audio/mp3;base64,' + cached.b64;
    startPlayback(audio, convIdx, paraIdx);
    return;
  }

  // 加载独立json
  const data = await loadParaAudio(conv.num, paraIdx);
  if (data && data.b64 && data.b64.length > 200) {
    audio.src = 'data:audio/mp3;base64,' + data.b64;
    startPlayback(audio, convIdx, paraIdx);
  }
}

function togglePlay(convIdx, paraIdx) {
  // 同一段落 → 切换播放/暂停
  if (currentAudio && currentAudio.convIdx === convIdx && currentAudio.paraIdx === paraIdx) {
    const audio = currentAudio.audio;
    if (!audio.paused) {
      // 正在播放 → 暂停
      audio.pause();
      const playBtn = document.getElementById(`play-${convIdx}-${paraIdx}`);
      if (playBtn) {
        playBtn.textContent = '▶';
        playBtn.classList.remove('speaking');
      }
      document.getElementById(`para-${convIdx}-${paraIdx}`)?.classList.remove('playing');
    } else {
      // 已暂停 → 恢复
      const playBtn = document.getElementById(`play-${convIdx}-${paraIdx}`);
      audio.play().then(() => {
        if (playBtn) { playBtn.textContent = '⏸'; playBtn.classList.add('speaking'); }
        document.getElementById(`para-${convIdx}-${paraIdx}`)?.classList.add('playing');
      }).catch(() => {});
    }
    return;
  }
  // 否则停止当前播放，开始播放新段落
  stopAll();
  loadAndPlay(convIdx, paraIdx);
}

// 预加载首个段落（用于"播放全部"）
async function preloadFirstPara(conv, convIdx) {
  const data = await loadParaAudio(conv.num, 0);
  return data && data.b64 && data.b64.length > 200 ? data.b64 : null;
}

function setVoice(convIdx, voiceName) {
  currentVoice = voiceName;
  localStorage.setItem('italianVoice', voiceName);
  setVoiceUI();
}

function setVoiceUI() {
  document.querySelectorAll('.voice-select').forEach(sel => {
    sel.value = currentVoice;
  });
}

function startPlayback(audio, convIdx, paraIdx) {
  if (!audio.src || audio.src === '' || audio.src === window.location.href) {
    // No edge-tts audio available - skip silently
    return;
  }
  
  const speedKey = `speed3-${convIdx}-${paraIdx}`;
  audio.playbackRate = parseFloat(localStorage.getItem(speedKey) || '1');
  
  const playBtn = document.getElementById(`play-${convIdx}-${paraIdx}`);
  const paraEl = document.getElementById(`para-${convIdx}-${paraIdx}`);
  
  currentAudio = { convIdx, paraIdx, audio };
  
  audio.onended = () => {
    playBtn.textContent = '▶';
    playBtn.classList.remove('speaking');
    paraEl.classList.remove('playing');
    document.getElementById(`progbar-${convIdx}-${paraIdx}`).style.width = '0%';
    listenedSet.add(conversations[convIdx].num);
    saveProgress(); updateProgress();
    currentAudio = null;
  };
  
  audio.ontimeupdate = () => {
    if (audio.duration) {
      const pct = (audio.currentTime / audio.duration) * 100;
      document.getElementById(`progbar-${convIdx}-${paraIdx}`).style.width = pct + '%';
    }
  };
  
  audio.play().then(() => {
    playBtn.textContent = '⏸';
    playBtn.classList.add('speaking');
    paraEl.classList.add('playing');
  }).catch(e => {
    console.log('Play error:', e);
    playBtn.textContent = '▶';
  });
}

function stopAll() {
  if (currentAudio) {
    try { currentAudio.audio.pause(); currentAudio.audio.currentTime = 0; } catch(e) {}
    const { convIdx, paraIdx } = currentAudio;
    const btn = document.getElementById(`play-${convIdx}-${paraIdx}`);
    if (btn) { btn.textContent = '▶'; btn.classList.remove('speaking'); }
    const el = document.getElementById(`para-${convIdx}-${paraIdx}`);
    if (el) el.classList.remove('playing');
    document.getElementById(`progbar-${convIdx}-${paraIdx}`).style.width = '0%';
    currentAudio = null;
  }
  // Also stop any HTML audio elements
  document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
  document.querySelectorAll('.play-btn.speaking').forEach(b => { b.textContent = '▶'; b.classList.remove('speaking'); });
  document.querySelectorAll('.paragraph.playing').forEach(p => p.classList.remove('playing'));
  document.querySelectorAll('.audio-progress-bar').forEach(b => b.style.width = '0%');
}

function setSpeed(convIdx, paraIdx, speed) {
  const key = `speed3-${convIdx}-${paraIdx}`;
  localStorage.setItem(key, speed.toString());
  const el = document.getElementById(`para-${convIdx}-${paraIdx}`);
  if (el) {
    el.querySelectorAll('.speed-btn').forEach(b => {
      b.classList.toggle('active', parseFloat(b.textContent) === speed);
    });
  }
  // Apply to currently playing audio
  if (currentAudio && currentAudio.convIdx === convIdx && currentAudio.paraIdx === paraIdx) {
    currentAudio.audio.playbackRate = speed;
  }
}

function playAll(convIdx) {
  if (currentAudio) stopAll();
  const conv = conversations[convIdx];
  
  let pIdx = 0;
  
  async function playNext() {
    if (pIdx >= conv.paragraphs.length) {
      listenedSet.add(conv.num);
      saveProgress(); updateProgress();
      return;
    }
    
    const audio = getAudioEl(convIdx, pIdx);
    // 按需加载段落音频
    const key = `${conv.num}-${pIdx}`;
    const cached = loadedParaAudio[key];
    let b64 = cached && cached.b64 && cached.b64.length > 200 ? cached.b64 : null;
    
    if (!b64) {
      const data = await loadParaAudio(conv.num, pIdx);
      b64 = data && data.b64 && data.b64.length > 200 ? data.b64 : null;
    }
    
    if (b64) {
      audio.src = 'data:audio/mp3;base64,' + b64;
    } else {
      // Fallback to TTS
      if (!audio || !audio.src || audio.src === '' || audio.src === window.location.href) { pIdx++; setTimeout(playNext, 200); return; }
    }
    if (!audio.src || audio.src === '' || audio.src === window.location.href) { pIdx++; setTimeout(playNext, 200); return; }
    
    const speedKey = `speed3-${convIdx}-${pIdx}`;
    audio.playbackRate = parseFloat(localStorage.getItem(speedKey) || '1');
    
    const playBtn = document.getElementById(`play-${convIdx}-${pIdx}`);
    const paraEl = document.getElementById(`para-${convIdx}-${pIdx}`);
    
    currentAudio = { convIdx, paraIdx: pIdx, audio };
    
    audio.onended = () => {
      if (playBtn) { playBtn.textContent = '▶'; playBtn.classList.remove('speaking'); }
      if (paraEl) paraEl.classList.remove('playing');
      document.getElementById(`progbar-${convIdx}-${pIdx}`).style.width = '0%';
      pIdx++;
      setTimeout(playNext, 500);
    };
    
    audio.ontimeupdate = () => {
      if (audio.duration) {
        document.getElementById(`progbar-${convIdx}-${pIdx}`).style.width = 
          (audio.currentTime / audio.duration * 100) + '%';
      }
    };
    
    audio.play().then(() => {
      if (playBtn) { playBtn.textContent = '⏸'; playBtn.classList.add('speaking'); }
      if (paraEl) paraEl.classList.add('playing');
    }).catch(() => { pIdx++; setTimeout(playNext, 200); });
  }
  
  // 预加载首个段落
  playNext();
}

function speakWord(convNum, vocabIdx) {
  stopAll();
  const conv = conversations.find(c => c.num === convNum);
  if (!conv || !conv.vocab || vocabIdx < 0 || vocabIdx >= conv.vocab.length) return;
  
  const audio = new Audio();
  fetch(`vocab_para/vocab_${convNum}_${vocabIdx}.json?v=9`)
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (data && data.b64 && data.b64.length > 200) {
        audio.src = 'data:audio/mp3;base64,' + data.b64;
        audio.play().catch(() => {});
      }
    })
    .catch(() => {});
}

// ===== UI Toggles =====
function toggleText(convIdx, paraIdx) {
  const el = document.getElementById(`text-${convIdx}-${paraIdx}`);
  if (el) el.classList.toggle('hidden');
}

function toggleTranslation(convIdx, paraIdx) {
  const conv = conversations[convIdx];
  const el = document.getElementById(`trans-${convIdx}-${paraIdx}`);
  if (!el) return;
  
  // If already open, close it
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    return;
  }
  
  // If we have translation text, just open
  if (conv.translations && conv.translations[paraIdx] && conv.translations[paraIdx].length > 1) {
    el.textContent = conv.translations[paraIdx];
    el.classList.add('open');
    return;
  }
  
  // No translation yet
  el.textContent = '📝 译文尚未生成';
  el.classList.add('open');
  el.style.padding = '10px 14px';
  setTimeout(() => {
    el.style.maxHeight = '0';
    el.style.opacity = '0';
    el.style.padding = '0 14px';
  }, 3000);
}

function goConv(idx) {
  if (idx < 0 || idx >= conversations.length) return;
  stopAll();
  showConversation(idx);
}

function showDirectory() {
  stopAll();
  currentIdx = -1;
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  // Re-show the welcome/directory screen (same as sidebar open content)
  document.getElementById('contentArea').innerHTML = '<div style="text-align:center;padding:80px 20px;color:var(--text2)" id="startScreen"><h2 style="color:var(--text);margin-bottom:16px;font-size:1.5rem">🎧 101 Conversations</h2><p style="font-size:1rem;line-height:1.8">意大利语中级听力练习<br><span style="color:var(--accent2)">中意双语 · edge-tts原声 · 三段语速</span></p><div style="margin-top:32px;display:flex;flex-direction:column;gap:10px;max-width:300px;margin-left:auto;margin-right:auto"><div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:left;font-size:.85rem;color:var(--text2)">👈 点击左侧任一篇对话开始</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:left;font-size:.85rem;color:var(--text2)">🔊 点击 ▶ 播放意大利语原声<br><span style="font-size:.75rem;opacity:.6">0.6x / 1x / 1.4x 三档语速</span></div><div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:left;font-size:.85rem;color:var(--text2)">📘 点击「译文」查看中文翻译</div></div></div>';
  // Also open the sidebar on mobile
  const sidebar = document.getElementById('sidebar');
  if (window.innerWidth <= 768) {
    sidebar.classList.add('open');
    document.getElementById('mobileOverlay').classList.add('active');
    document.body.classList.add('sidebar-open');
    // 侧栏打开时隐藏导航按钮
    document.getElementById('sidebarToggle').classList.add('hide');
  } else {
    // 桌面版显示导航按钮
    document.getElementById('sidebarToggle').classList.remove('hide');
  }
}

// ===== Sidebar =====
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('active');
  document.body.classList.remove('sidebar-open');
}

// ===== Helpers =====
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function updateProgress() {
  document.getElementById('progressInfo').textContent = `已读 ${listenedSet.size} / ${conversations.length}`;
}

function updateSidebarTitles() {
  conversations.forEach(c => {
    const el = document.querySelector(`.conv-item[data-idx="${c.num - 1}"] .conv-title`);
    if (el && c.title_cn) {
      el.textContent = c.title_cn;
    }
  });
}

function saveProgress() {
  localStorage.setItem(LS_KEY, JSON.stringify([...listenedSet]));
}

// ===== Keyboard =====
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') goConv(currentIdx - 1);
  if (e.key === 'ArrowRight') goConv(currentIdx + 1);
  if (e.key === ' ' && e.target === document.body) { e.preventDefault(); stopAll(); }
});

// ===== Init =====
// Nothing to pre-load - sidebar click handler triggers data loading

// ===== Event Listeners =====
document.getElementById('sidebarToggle').addEventListener('click', () => {
  const sidebar = document.getElementById('sidebar');
  const opening = !sidebar.classList.contains('open');
  sidebar.classList.toggle('open');
  document.getElementById('mobileOverlay').classList.toggle('active');
  if (opening) {
    document.body.classList.add('sidebar-open');
    document.getElementById('sidebarToggle').classList.add('hide');
    // When sidebar opens on mobile, clear the content area
    document.getElementById('contentArea').innerHTML = '<div style="text-align:center;padding:80px 20px;color:var(--text2)" id="startScreen"><h2 style="color:var(--text);margin-bottom:16px;font-size:1.5rem">🎧 101 Conversations</h2><p style="font-size:1rem;line-height:1.8">意大利语中级听力练习<br><span style="color:var(--accent2)">中意双语 · edge-tts原声 · 三段语速</span></p><p style="margin-top:12px;font-size:.78rem;color:var(--text2)" id="loadHint">✅</p><div style="margin-top:32px;display:flex;flex-direction:column;gap:10px;max-width:300px;margin-left:auto;margin-right:auto"><div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:left;font-size:.85rem;color:var(--text2)">👈 点击左侧任一篇对话开始</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:left;font-size:.85rem;color:var(--text2)">🔊 点击 ▶ 播放意大利语原声<br><span style="font-size:.75rem;opacity:.6">0.6x / 1x / 1.4x 三档语速</span></div><div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:left;font-size:.85rem;color:var(--text2)">📘 点击「译文」查看中文翻译</div></div></div>';
  } else {
    document.body.classList.remove('sidebar-open');
    // Show nav toggle again when sidebar closes (unless content is showing)
    if (currentIdx === -1) {
      document.getElementById('sidebarToggle').classList.remove('hide');
    }
  }
});
document.getElementById('mobileOverlay').addEventListener('click', closeSidebar);
</script>
